# .github/workflows/run-eval.yml
name: CUGA Eval on Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: eval-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  run-eval:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/run-eval') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: [self-hosted, linux, run-eval]
    timeout-minutes: 120

    steps:
      - name: Read PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput("head_repo", pr.data.head.repo.full_name);

      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Run AppWorld evaluation
        id: evaluation
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DYNACONF_SERVER_PORTS__REGISTRY: "8100"
          AGENT_SETTING_CONFIG: settings.rits.toml
          OPENAI_BASE_URL: https://inference-3scale-apicast-production.apps.rits.fmaas.res.ibm.com/gpt-oss-120b-a100
          MODEL_NAME: openai/gpt-oss-120b-a100
          ENVIRONMENT_URL: http://127.0.0.1:8000
          APIS_URL: http://127.0.0.1:9000
          PR_NUMBER: ${{ github.event.issue.number }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set +e

          bash /proj/cuga_models/eval-github-actions/scripts/run-eval.sh \
              "${COMMENT_BODY}" \
              > run-eval-output.md 2>&1

          status=$?
          echo "${status}" > run-eval-exit-code.txt
          exit 0
      
      - name: Post result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
      
            let output = "No evaluation output was generated.";
      
            if (fs.existsSync("run-eval-output.md")) {
              output = fs.readFileSync("run-eval-output.md", "utf8");
            }
      
            const startMarker = "######## REPORT START ########";
            const endMarker = "######## REPORT END ########";
      
            const escapedStart = startMarker.replace(
              /[.*+?^${}()|[\]\\]/g,
              "\\$&"
            );
      
            const escapedEnd = endMarker.replace(
              /[.*+?^${}()|[\]\\]/g,
              "\\$&"
            );
      
            const reportPattern = new RegExp(
              `${escapedStart}\\s*([\\s\\S]*?)\\s*${escapedEnd}`,
              "g"
            );
      
            const reportBlocks = [...output.matchAll(reportPattern)]
              .map(match => match[1].trim())
              .filter(block => block.length > 0);
      
            if (reportBlocks.length > 0) {
              output = reportBlocks.join("\n\n---\n\n");
            } else {
              output = "⚠️ No non-empty report sections were found.";
            }
      
            let exitCode = "unknown";
      
            if (fs.existsSync("run-eval-exit-code.txt")) {
              exitCode = fs
                .readFileSync("run-eval-exit-code.txt", "utf8")
                .trim();
            }
      
            const result = exitCode === "0" ? "SUCCESS" : "FAILED";
      
            if (output.length > 60000) {
              output =
                output.slice(0, 60000) +
                "\n\n...report truncated...";
            }
      
            const body = `## Run Evaluation
      
            - Triggered by: @${context.payload.comment.user.login}
            - Command: \`${context.payload.comment.body}\`
            - Result: **${result}**
      
            ${output}`.replace(/^ {6}/gm, "");
      
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Mark workflow failed when evaluation failed
        if: always()
        shell: bash
        run: |
          test "$(cat appworld-eval-exit-code.txt 2>/dev/null || echo 1)" -eq 0
