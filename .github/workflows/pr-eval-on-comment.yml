# .github/workflows/pr-eval-on-comment.yml
name: PR Eval on Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  pr-eval:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/pr-eval')
    runs-on: [self-hosted, linux]

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('repo_full_name', pr.data.head.repo.full_name);

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo_full_name }}
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Run PR eval script
        id: eval
        shell: bash
        run: |
          set +e
          chmod +x /root/eval-github-actions/scripts/pr-eval-demo.sh
          /root/eval-github-actions/scripts/pr-eval-demo.sh > pr-eval-output.md 2>&1

      - name: Comment result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = fs.readFileSync('pr-eval-output.md', 'utf8');

            if (output.length > 60000) {
              output = output.slice(0, 60000) + "\n\n...output truncated...";
            }

            const body = `## PR Eval Report

            Triggered by: @${context.payload.comment.user.login}

            \`\`\`
            ${output}
            \`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
